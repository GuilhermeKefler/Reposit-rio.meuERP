<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vixmilks ERP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f1f5f9; --surface:#fff; --surface2:#f8fafc; --border:#e2e8f0;
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-muted:#475569;
  --accent:#2563eb; --accent-h:#1d4ed8; --accent2:#0891b2; --accent3:#7c3aed;
  --success:#059669; --warn:#d97706; --danger:#dc2626;
  --text:#1e293b; --muted:#64748b;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  --sw:220px; --th:60px; --r:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1);
}
body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; min-height:100vh; }

/* LOGIN */
#login { display:flex; height:100vh; justify-content:center; align-items:center; background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%); position:relative; overflow:hidden; }
#login::before { content:''; position:absolute; width:600px; height:600px; border:1px solid rgba(255,255,255,.04); border-radius:50%; top:-200px; right:-200px; }
#login::after  { content:''; position:absolute; width:400px; height:400px; border:1px solid rgba(255,255,255,.04); border-radius:50%; bottom:-150px; left:-100px; }
.login-box { background:#fff; border-radius:16px; padding:44px 40px; width:340px; box-shadow:var(--shadow-lg); position:relative; z-index:1; animation:fadeUp .5s ease; }
.login-brand { font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
.login-box h2 { font-size:26px; font-weight:700; margin-bottom:4px; }
.login-box p { font-size:13px; color:var(--muted); margin-bottom:28px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.field input, .field select { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font:inherit; font-size:14px; outline:none; transition:border-color .2s, box-shadow .2s; background:#fff; }
.field input:focus, .field select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.field input.err { border-color:var(--danger); box-shadow:0 0 0 3px rgba(220,38,38,.1); }
.login-err { font-size:12px; color:var(--danger); font-weight:500; min-height:18px; margin-top:8px; }
.btn-login { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font:inherit; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px; transition:background .2s, transform .1s; letter-spacing:.02em; }
.btn-login:hover { background:var(--accent-h); transform:translateY(-1px); }
.login-hint { margin-top:16px; background:#f8fafc; border-radius:8px; padding:10px 14px; font-size:12px; color:var(--muted); text-align:center; line-height:1.6; }
.login-hint strong { color:var(--accent); }

/* SHELL */
#app { display:none; }
.sidebar { width:var(--sw); height:100vh; background:var(--sidebar); position:fixed; top:0; left:0; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:22px 18px 18px; border-bottom:1px solid rgba(255,255,255,.06); }
.sidebar-brand { font-size:10px; font-weight:600; color:#38bdf8; letter-spacing:.2em; text-transform:uppercase; margin-bottom:4px; }
.sidebar-title { font-size:18px; font-weight:700; color:#fff; }
.sidebar-sub { font-size:11px; color:var(--sidebar-muted); margin-top:2px; }
.sidebar-nav { flex:1; padding:10px 0; overflow-y:auto; }
.nav-section { margin-bottom:4px; }
.nav-sec-label { font-size:10px; font-weight:600; color:var(--sidebar-muted); letter-spacing:.12em; text-transform:uppercase; padding:8px 18px 4px; }
.nav-btn { display:flex; align-items:center; gap:10px; width:100%; padding:9px 18px; background:none; border:none; border-left:2px solid transparent; color:var(--sidebar-text); font:inherit; font-size:13px; text-align:left; cursor:pointer; transition:all .15s; }
.nav-btn:hover { color:#fff; background:rgba(255,255,255,.05); }
.nav-btn.active { color:#38bdf8; border-left-color:#38bdf8; background:rgba(56,189,248,.08); }
.nav-btn[disabled] { opacity:.35; cursor:not-allowed; }
.nav-icon { font-size:15px; width:18px; text-align:center; }
.sidebar-footer { padding:14px 18px; border-top:1px solid rgba(255,255,255,.06); }
.sidebar-user { display:flex; align-items:center; gap:10px; }
.user-avatar { width:32px; height:32px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }
.user-name { font-size:13px; color:#fff; font-weight:500; }
.user-role { font-size:11px; color:var(--sidebar-muted); }
.btn-logout { margin-left:auto; background:none; border:none; color:var(--sidebar-muted); cursor:pointer; font-size:16px; transition:color .15s; }
.btn-logout:hover { color:#fc8181; }

/* TOPBAR */
.topbar { margin-left:var(--sw); height:var(--th); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; position:sticky; top:0; z-index:10; gap:12px; }
.topbar-title { font-size:15px; font-weight:600; }
.topbar-sub { font-size:12px; color:var(--muted); margin-left:2px; }
.topbar-spacer { flex:1; }
.topbar-date { font-size:12px; color:var(--muted); font-family:var(--mono); }
.bell { position:relative; background:none; border:none; cursor:pointer; padding:6px 10px; border-radius:8px; transition:background .15s; font-size:16px; }
.bell:hover { background:var(--surface2); }
.bell-dot { position:absolute; top:4px; right:6px; min-width:16px; height:16px; padding:0 4px; background:var(--danger); color:#fff; font-size:10px; font-weight:700; border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:var(--font); }

/* CONTENT */
.content { margin-left:var(--sw); padding:24px; min-height:calc(100vh - var(--th)); }
.page-header { margin-bottom:22px; display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; }
.page-title { font-size:20px; font-weight:700; }
.page-sub { font-size:13px; color:var(--muted); margin-top:3px; }
.page-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* CARD */
.card { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow); padding:22px; margin-bottom:18px; border:1px solid var(--border); }
.card-title { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }
.grid2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
.grid3 { display:grid; grid-template-columns:1fr 1fr 1fr; gap:16px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:18px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.stat-card.c1::before { background:linear-gradient(90deg,#2563eb,#38bdf8); }
.stat-card.c2::before { background:linear-gradient(90deg,#0891b2,#06b6d4); }
.stat-card.c3::before { background:linear-gradient(90deg,#7c3aed,#a78bfa); }
.stat-card.c4::before { background:linear-gradient(90deg,#d97706,#fbbf24); }
.stat-card.c5::before { background:linear-gradient(90deg,#dc2626,#f87171); }
.stat-label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-size:24px; font-weight:700; font-family:var(--mono); line-height:1; }
.stat-icon { position:absolute; top:16px; right:16px; font-size:20px; opacity:.1; }

/* TABLE */
.table-wrap { overflow-x:auto; }
table { width:100%; border-collapse:collapse; }
th { font-size:11px; font-weight:600; color:var(--muted); text-align:left; padding:9px 14px; border-bottom:2px solid var(--border); letter-spacing:.06em; text-transform:uppercase; white-space:nowrap; }
th.sortable { cursor:pointer; user-select:none; }
th.sortable:hover { color:var(--text); }
th .sort-ind { font-size:9px; margin-left:4px; opacity:.6; }
td { padding:11px 14px; border-bottom:1px solid var(--border); font-size:13px; }
tr:last-child td { border-bottom:none; }
tbody tr:hover td { background:#f8fafc; }
.row-actions { display:flex; gap:6px; flex-wrap:wrap; }

/* FORM */
.form-row { display:grid; gap:12px; align-items:end; margin-bottom:20px; }
.form-field label { display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
.form-field input, .form-field select, .form-field textarea {
  width:100%; padding:10px 13px; border:1.5px solid var(--border); border-radius:8px;
  font:inherit; font-size:13px; background:#fff; outline:none; transition:border-color .2s, box-shadow .2s;
}
.form-field input:focus, .form-field select:focus, .form-field textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.btn-add { padding:10px 20px; background:var(--accent); color:#fff; border:none; border-radius:8px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; height:38px; white-space:nowrap; transition:background .2s; }
.btn-add:hover { background:var(--accent-h); }
.btn-add[disabled] { background:#94a3b8; cursor:not-allowed; }
.btn-edit { padding:5px 12px; background:#fff; color:var(--accent); border:1.5px solid #bfdbfe; border-radius:6px; font:inherit; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn-edit:hover { background:#eff6ff; border-color:var(--accent); }
.btn-del { padding:5px 12px; background:#fff; color:var(--danger); border:1.5px solid #fecaca; border-radius:6px; font:inherit; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn-del:hover { background:#fef2f2; border-color:var(--danger); }
.btn-go { padding:5px 12px; background:#fff; color:var(--success); border:1.5px solid #bbf7d0; border-radius:6px; font:inherit; font-size:12px; font-weight:500; cursor:pointer; transition:all .15s; }
.btn-go:hover { background:#f0fdf4; border-color:var(--success); }
.btn-secondary { padding:10px 18px; background:#fff; color:var(--muted); border:1.5px solid var(--border); border-radius:8px; font:inherit; font-size:13px; font-weight:500; cursor:pointer; height:38px; transition:all .15s; }
.btn-secondary:hover { color:var(--text); border-color:var(--text); }
.btn-warn { padding:10px 18px; background:var(--warn); color:#fff; border:none; border-radius:8px; font:inherit; font-size:13px; font-weight:600; cursor:pointer; height:38px; transition:background .2s; }
.btn-warn:hover { background:#b45309; }

.search-box { padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font:inherit; font-size:13px; min-width:220px; outline:none; transition:border-color .2s, box-shadow .2s; }
.search-box:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.filter-sel { padding:8px 12px; border:1.5px solid var(--border); border-radius:8px; font:inherit; font-size:13px; background:#fff; cursor:pointer; outline:none; }
.filter-sel:focus { border-color:var(--accent); }

/* PAGINATION */
.pager { display:flex; justify-content:space-between; align-items:center; margin-top:14px; padding-top:14px; border-top:1px solid var(--border); font-size:12px; color:var(--muted); flex-wrap:wrap; gap:8px; }
.pager-btns { display:flex; gap:4px; }
.pager-btn { background:#fff; border:1.5px solid var(--border); border-radius:6px; padding:5px 10px; font:inherit; font-size:12px; cursor:pointer; min-width:30px; transition:all .15s; }
.pager-btn:hover:not([disabled]) { border-color:var(--accent); color:var(--accent); }
.pager-btn[disabled] { opacity:.4; cursor:not-allowed; }
.pager-btn.active { background:var(--accent); color:#fff; border-color:var(--accent); }

/* BADGE */
.badge { display:inline-flex; align-items:center; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-ok { background:#dcfce7; color:#166534; }
.badge-warn { background:#fef3c7; color:#92400e; }
.badge-danger { background:#fee2e2; color:#991b1b; }
.badge-blue { background:#dbeafe; color:#1e40af; }
.badge-purple { background:#ede9fe; color:#5b21b6; }
.badge-sky { background:#e0f2fe; color:#075985; }
.badge-gray { background:#f1f5f9; color:#475569; }

/* CRP / GANTT */
.crp-bar-wrap { margin-bottom:14px; }
.crp-bar-label { display:flex; justify-content:space-between; font-size:13px; margin-bottom:6px; font-weight:500; }
.crp-bar-bg { height:8px; background:var(--border); border-radius:4px; overflow:hidden; }
.crp-bar-fill { height:100%; border-radius:4px; transition:width .6s ease; }
.gantt { font-family:var(--mono); font-size:11px; }
.gantt-head { display:grid; gap:4px; align-items:center; padding:6px 0; border-bottom:2px solid var(--border); margin-bottom:8px; color:var(--muted); font-weight:600; text-transform:uppercase; letter-spacing:.06em; }
.gantt-row { display:grid; gap:4px; align-items:center; padding:6px 0; border-bottom:1px solid var(--border); }
.gantt-name { font-family:var(--font); font-weight:600; font-size:12px; padding-right:8px; color:var(--text); }
.gantt-track { display:flex; height:22px; background:var(--surface2); border-radius:4px; position:relative; overflow:hidden; }
.gantt-bar { position:absolute; height:100%; background:linear-gradient(90deg,#2563eb,#0891b2); border-radius:3px; display:flex; align-items:center; justify-content:center; color:#fff; font-size:10px; font-weight:600; padding:0 6px; overflow:hidden; white-space:nowrap; min-width:8px; box-shadow:inset 0 -2px 0 rgba(0,0,0,.1); }
.gantt-bar.b2 { background:linear-gradient(90deg,#7c3aed,#a78bfa); }
.gantt-bar.b3 { background:linear-gradient(90deg,#d97706,#fbbf24); }
.gantt-bar.b4 { background:linear-gradient(90deg,#059669,#10b981); }

.chart-wrap { position:relative; height:230px; }
.info-box { background:#eff6ff; border:1.5px solid #bfdbfe; border-radius:8px; padding:12px 16px; margin-bottom:16px; font-size:13px; color:#1e40af; line-height:1.6; }
.empty { text-align:center; padding:44px; color:var(--muted); font-size:13px; }
.empty-icon { font-size:32px; margin-bottom:10px; }
.alert-danger { background:#fef2f2; border:1.5px solid #fecaca; border-radius:8px; padding:12px 16px; font-size:13px; color:var(--danger); margin-top:14px; font-weight:500; }
.alert-ok { background:#f0fdf4; border:1.5px solid #bbf7d0; border-radius:8px; padding:12px 16px; font-size:13px; color:#166534; margin-top:14px; font-weight:500; }
.pill { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500; }
.pill-blue { background:#dbeafe; color:#1e40af; }

/* MODAL */
.modal-bg { position:fixed; inset:0; background:rgba(15,23,42,.5); z-index:100; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadeIn .2s ease; }
.modal-box { background:#fff; border-radius:14px; max-width:560px; width:100%; max-height:90vh; box-shadow:var(--shadow-lg); display:flex; flex-direction:column; overflow:hidden; animation:fadeUp .3s ease; }
.modal-box.lg { max-width:780px; }
.modal-head { padding:18px 22px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; }
.modal-title { font-size:16px; font-weight:700; }
.modal-close { background:none; border:none; font-size:22px; color:var(--muted); cursor:pointer; line-height:1; }
.modal-body { padding:22px; overflow-y:auto; flex:1; }
.modal-foot { padding:14px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; }
.fld { margin-bottom:14px; }
.fld label { display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:5px; }
.fld input, .fld select, .fld textarea { width:100%; padding:10px 13px; border:1.5px solid var(--border); border-radius:8px; font:inherit; font-size:13px; background:#fff; outline:none; transition:border-color .2s, box-shadow .2s; }
.fld input:focus, .fld select:focus, .fld textarea:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }

/* TOAST */
.toast-wrap { position:fixed; top:18px; right:18px; z-index:200; display:flex; flex-direction:column; gap:8px; max-width:340px; }
.toast { background:#fff; border:1.5px solid var(--border); border-left:4px solid var(--accent); border-radius:8px; padding:12px 16px; box-shadow:var(--shadow-lg); font-size:13px; animation:slideIn .3s ease; }
.toast.ok { border-left-color:var(--success); }
.toast.warn { border-left-color:var(--warn); }
.toast.err { border-left-color:var(--danger); }
.toast-title { font-weight:700; font-size:13px; margin-bottom:2px; }
.toast-msg { color:var(--muted); font-size:12px; line-height:1.5; }

@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
@keyframes slideIn { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:translateX(0)} }
.page-anim { animation:fadeUp .3s ease; }

@media (max-width:900px){
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .grid2, .grid3 { grid-template-columns:1fr; }
  .sidebar { transform:translateX(-100%); transition:transform .2s; z-index:50; }
  .sidebar.open { transform:translateX(0); }
  .topbar, .content { margin-left:0; }
}

@media print {
  .sidebar, .topbar, .page-actions, .pager, .row-actions, .card-title>div:nth-child(2) { display:none !important; }
  .content { margin-left:0; padding:0; }
  .card { box-shadow:none; border:1px solid #ddd; page-break-inside:avoid; }
  body { background:#fff; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-brand">Laticínios · ERP</div>
    <h2>Vixmilks</h2>
    <p>Sistema de Gestão Industrial</p>
    <div class="field">
      <label>Usuário</label>
      <input id="user" placeholder="Admin" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="field">
      <label>Senha</label>
      <input id="pass" type="password" placeholder="••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div id="login-err" class="login-err"></div>
    <button class="btn-login" onclick="login()">Entrar no Sistema</button>
    <div class="login-hint">
      <strong>Admin</strong> / 1234 &nbsp;·&nbsp; <strong>supervisor</strong> / 1234<br>
      <strong>operador</strong> / 1234
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">ERP · PCP</div>
      <div class="sidebar-title">Vixmilks</div>
      <div class="sidebar-sub">Laticínios Industrial</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="uavatar">A</div>
        <div>
          <div class="user-name" id="uname">Admin</div>
          <div class="user-role" id="urole">Administrador</div>
        </div>
        <button class="btn-logout" title="Sair" onclick="logout()">⏻</button>
      </div>
    </div>
  </div>

  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <span class="topbar-sub" id="topbar-sub">Vixmilks · Sistema de Gestão</span>
    <div class="topbar-spacer"></div>
    <button class="bell" id="bell" title="Notificações" onclick="openNotifications()">🔔<span class="bell-dot" id="bell-dot" style="display:none">0</span></button>
    <span class="topbar-date" id="topbar-date"></span>
    <span class="pill pill-blue" id="topbar-user-pill">👤 Admin</span>
  </div>

  <div class="content" id="content"></div>
</div>

<div id="modal-host"></div>
<div id="toast-host" class="toast-wrap"></div>

<script>
/* ── HELPERS ── */
function n(v){ const x=Number(v); return isFinite(x)?x:0; }
function fmt(v){ return n(v).toLocaleString('pt-BR'); }
function money(v){ return 'R$ '+n(v).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function escapeHtml(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function uid(){ return 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function addDaysISO(iso, d){ const dt=new Date(iso); dt.setDate(dt.getDate()+d); return dt.toISOString().slice(0,10); }
function fmtDate(iso){ if(!iso) return '—'; try{ return new Date(iso+'T00:00').toLocaleDateString('pt-BR'); }catch(e){return iso;} }
function daysBetween(a,b){ return Math.max(1, Math.round((new Date(b)-new Date(a))/86400000)+1); }

async function sha256(s){
  const buf = new TextEncoder().encode(s);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── STORAGE ── */
function getData(k){ try { return JSON.parse(localStorage.getItem('vmk_'+k))||[]; } catch(e){ return []; } }
function saveData(k,d){ try { localStorage.setItem('vmk_'+k, JSON.stringify(d)); } catch(e){ toast('err','Erro','Armazenamento cheio.'); } }
function getById(k,id){ return getData(k).find(x=>x.id===id); }
function updateById(k,id,patch){
  const list = getData(k);
  const i = list.findIndex(x=>x.id===id);
  if(i<0) return false;
  list[i] = {...list[i], ...patch};
  saveData(k,list); return true;
}
function deleteById(k,id){
  const list = getData(k).filter(x=>x.id!==id);
  saveData(k,list);
}

/* ── TOASTS ── */
function toast(type, title, msg){
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast '+type;
  el.innerHTML = `<div class="toast-title">${escapeHtml(title)}</div><div class="toast-msg">${escapeHtml(msg)}</div>`;
  host.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; el.style.transform='translateX(20px)'; el.style.transition='.3s'; }, 3500);
  setTimeout(()=>el.remove(), 3900);
}

function getAlerts(){
  const prods = getData('produtos');
  const est = getData('estoque');
  const alerts = [];
  prods.filter(p=>n(p.estoque)<50).forEach(p=>alerts.push({tipo:'warn',msg:`Estoque baixo: ${p.nome} (${p.estoque} un)`}));
  est.forEach(e=>{
    const p = getById('produtos', e.produtoId);
    if(p && n(p.estoque) < n(e.seg)) alerts.push({tipo:'err',msg:`Abaixo do segurança: ${p.nome}`});
  });
  return alerts;
}
function refreshBell(){
  const alerts = getAlerts();
  const dot = document.getElementById('bell-dot');
  if(alerts.length){ dot.style.display='flex'; dot.textContent=alerts.length; }
  else { dot.style.display='none'; }
}
function openNotifications(){
  const alerts = getAlerts();
  const body = alerts.length
    ? alerts.map(a=>`<div class="alert-${a.tipo==='err'?'danger':a.tipo==='warn'?'danger':'ok'}" style="margin-top:8px">${escapeHtml(a.msg)}</div>`).join('')
    : `<div class="empty"><div class="empty-icon">✅</div>Sem alertas no momento.</div>`;

}

  const usr = getData('usuarios').find(x=>x.nome.toLowerCase()===u.toLowerCase() && x.senhaHash===hash);
  if(usr){

/* ── BUSCA / ORDENAÇÃO / PAGINAÇÃO ── */
function applyFilter(list, page, fields){
  const s = ps(page).search.trim().toLowerCase();
  if(!s) return list;
  return list.filter(it=>fields.some(f=>String(it[f]??'').toLowerCase().includes(s)));
}
function applySort(list, page, getters){
  const st = ps(page);
  if(!st.sort || !getters[st.sort]) return list;
  const g = getters[st.sort];
  const arr = [...list];
  arr.sort((a,b)=>{
    const va=g(a), vb=g(b);
    if(typeof va==='number' && typeof vb==='number') return st.dir==='asc'?va-vb:vb-va;
    return st.dir==='asc' ? String(va).localeCompare(String(vb),'pt-BR') : String(vb).localeCompare(String(va),'pt-BR');
  });
  return arr;
}
function applyPage(list, page){
  const st = ps(page);
  const start = (st.page-1)*st.pageSize;
  return list.slice(start, start+st.pageSize);
}
function setSort(page, key){
  const st = ps(page);
  if(st.sort===key){ st.dir = st.dir==='asc'?'desc':'asc'; }
  else { st.sort=key; st.dir='asc'; }
  load(page);
}
function setSearch(page, val){ ps(page).search=val; ps(page).page=1; load(page); }
function setFilter(page, val){ ps(page).filter=val; ps(page).page=1; load(page); }
function setPg(page, v){ ps(page).page=v; load(page); }
function thSort(page, label, key){
  const st = ps(page);
  const ind = st.sort===key ? (st.dir==='asc'?'▲':'▼') : '⇅';
  return `<th class="sortable" onclick="setSort('${page}','${key}')">${label}<span class="sort-ind">${ind}</span></th>`;
}
function pagerHtml(page, total){
  const st = ps(page);
  const pages = Math.max(1, Math.ceil(total/st.pageSize));
  if(st.page>pages) st.page=pages;
  const start = total===0?0:(st.page-1)*st.pageSize+1;
  const end = Math.min(total, st.page*st.pageSize);
  let buttons = '';
  for(let i=1;i<=pages;i++){
    if(pages>7 && Math.abs(i-st.page)>2 && i!==1 && i!==pages){
      if(i===2 || i===pages-1) buttons += `<span style="padding:0 4px">…</span>`;
      continue;
    }
    buttons += `<button class="pager-btn ${i===st.page?'active':''}" onclick="setPg('${page}',${i})">${i}</button>`;
  }
  return `<div class="pager">
    <div>Mostrando ${start}–${end} de ${total} · <select class="filter-sel" style="padding:3px 8px" onchange="ps('${page}').pageSize=Number(this.value);ps('${page}').page=1;load('${page}')">${[5,10,25,50].map(s=>`<option ${st.pageSize===s?'selected':''}>${s}</option>`).join('')}</select> por página</div>
    <div class="pager-btns">
      <button class="pager-btn" ${st.page<=1?'disabled':''} onclick="setPg('${page}',${st.page-1})">‹</button>
      ${buttons}
      <button class="pager-btn" ${st.page>=pages?'disabled':''} onclick="setPg('${page}',${st.page+1})">›</button>
    </div>
  </div>`;
}

/* ── CSV ── */
function parseCSV(txt){
  const lines = txt.replace(/\r/g,'').split('\n').filter(l=>l.trim());
  if(!lines.length) return [];
  const head = lines[0].split(',').map(h=>h.trim());
  return lines.slice(1).map(l=>{
    const cells = []; let cur=''; let q=false;
    for(let i=0;i<l.length;i++){
      const c=l[i];
      if(c==='"'){ q=!q; }
      else if(c===',' && !q){ cells.push(cur); cur=''; }
      else cur+=c;
    }
    cells.push(cur);
    const obj={};
    head.forEach((h,i)=>obj[h]=cells[i]?.trim()??'');
    return obj;
  });
}
function toCSV(arr, cols){
  const head = cols.join(',');
  const body = arr.map(o=>cols.map(c=>{
    const v = String(o[c]??'').replace(/"/g,'""');
    return /[,"\n]/.test(v) ? `"${v}"` : v;
  }).join(',')).join('\n');
  return head+'\n'+body;
}
function downloadFile(name, content, type){
  const blob = new Blob([content], {type:type||'text/plain'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = name;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(a.href), 1000);
}

/* ── CÁLCULO DE CUSTO E MRP RECURSIVO ── */
function calcCustoCalculado(produtoId, visited){
  visited = visited || new Set();
  if(visited.has(produtoId)) return 0;
  visited.add(produtoId);
  const bom = getData('bom').filter(b=>b.paiId===produtoId);
  if(!bom.length){
    const p = getById('produtos', produtoId);
    return p ? n(p.custo) : 0;
  }
  let total = 0;
  for(const b of bom){
    const sub = calcCustoCalculado(b.compId, new Set(visited));
    total += sub * n(b.qtd);
  }
  return total;
}
function explodeNeeds(produtoId, qtd, acc){
  const bom = getData('bom').filter(b=>b.paiId===produtoId);
  if(!bom.length){
    acc[produtoId] = (acc[produtoId]||0) + qtd;
    return;
  }
  for(const b of bom) explodeNeeds(b.compId, n(b.qtd)*qtd, acc);
}

function saveProduto(id){
  const nome = document.getElementById('f-nome').value.trim();
  if(!nome){ toast('err','Erro','Nome obrigatório.'); return; }
  const data = {nome, categoria:document.getElementById('f-cat').value, estoque:Math.max(0,n(document.getElementById('f-est').value)), custo:Math.max(0,n(document.getElementById('f-custo').value))};
  const list = getData('produtos');
  const dup = list.find(p=>p.nome.toLowerCase()===nome.toLowerCase() && p.id!==id);
  if(dup){ toast('err','Erro','Já existe um produto com esse nome.'); return; }
  if(id){
    updateById('produtos', id, data);
    audit('UPDATE_PRODUTO', `${nome}`);
  } else {
    list.push({id:uid(), ...data});
    saveData('produtos', list);
    audit('CREATE_PRODUTO', `${nome}`);
  }
  closeModal(); toast('ok','Salvo','Produto registrado.'); produtos();
}
function delProduto(id){
  const p = getById('produtos', id);
  if(!p) return;
  const usadoBOM = getData('bom').some(b=>b.paiId===id||b.compId===id);
  const usadoPMP = getData('pmp').some(x=>x.produtoId===id);
  const usadoEst = getData('estoque').some(x=>x.produtoId===id);
  let msg = `Remover "${p.nome}"?`;
  if(usadoBOM||usadoPMP||usadoEst) msg += `\n\nEle está sendo usado em: ${[usadoBOM?'BOM':null,usadoPMP?'PMP':null,usadoEst?'Estoque':null].filter(Boolean).join(', ')}.\nReferências também serão removidas.`;
  if(!confirm(msg)) return;
  deleteById('produtos', id);
  if(usadoBOM) saveData('bom', getData('bom').filter(b=>b.paiId!==id&&b.compId!==id));
  if(usadoPMP) saveData('pmp', getData('pmp').filter(x=>x.produtoId!==id));
  if(usadoEst) saveData('estoque', getData('estoque').filter(x=>x.produtoId!==id));
  audit('DELETE_PRODUTO', `${p.nome}`);
  toast('ok','Removido','Produto excluído.');
  produtos();
}
function exportProdutosCSV(){
  const csv = toCSV(getData('produtos'), ['nome','categoria','estoque','custo']);
  downloadFile('produtos.csv', csv, 'text/csv');
  toast('ok','Exportado','CSV gerado.');
}
function importProdutosCSV(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const rows = parseCSV(e.target.result);
      const list = getData('produtos');
      let added=0, updated=0;
      for(const row of rows){
        if(!row.nome) continue;
        const ex = list.find(p=>p.nome.toLowerCase()===row.nome.toLowerCase());
        const data = {nome:row.nome, categoria:row.categoria||'Acabado', estoque:n(row.estoque), custo:n(row.custo)};
        if(ex){ Object.assign(ex, data); updated++; }
        else { list.push({id:uid(), ...data}); added++; }
      }
      saveData('produtos', list);
      audit('IMPORT_CSV_PRODUTOS', `+${added} novos, ${updated} atualizados`);
      toast('ok','Importado',`${added} novos, ${updated} atualizados.`);
      produtos();
    } catch(err){ toast('err','Erro','CSV inválido.'); }
  };
  r.readAsText(f);
  ev.target.value='';
}

function savePMP(id){
  const data = {
    produtoId:document.getElementById('f-prod').value,
    dataInicio:document.getElementById('f-ini').value,
    dataFim:document.getElementById('f-fim').value,
    qtd:n(document.getElementById('f-qtd').value),
    status:document.getElementById('f-st').value,
    maquinaId:document.getElementById('f-maq').value,
    operadorId:document.getElementById('f-op').value
  };
  if(!data.produtoId||!data.dataInicio||!data.dataFim||data.qtd<=0){ toast('err','Erro','Preencha campos obrigatórios.'); return; }
  if(new Date(data.dataFim) < new Date(data.dataInicio)){ toast('err','Erro','Data fim antes do início.'); return; }
  if(id){ updateById('pmp', id, data); audit('UPDATE_PMP',''); }
  else { const l=getData('pmp'); l.push({id:uid(),...data}); saveData('pmp',l); audit('CREATE_PMP',''); }
  closeModal(); toast('ok','Salvo','Pedido registrado.'); pmp();
}
function delPMP(id){ if(!confirm('Remover pedido?')) return; deleteById('pmp', id); audit('DELETE_PMP',''); pmp(); }

function executarPMP(id){
  const ped = getById('pmp', id);
  if(!ped) return;
  const prod = getById('produtos', ped.produtoId);
  if(!prod){ toast('err','Erro','Produto não existe.'); return; }
  const acc = {};
  explodeNeeds(ped.produtoId, n(ped.qtd), acc);
  const prods = getData('produtos');
  const pById = Object.fromEntries(prods.map(p=>[p.id,p]));
  const linhas = Object.entries(acc).map(([pid, qtd])=>{
    const p = pById[pid];
    const disp = p?n(p.estoque):0;
    return {pid, nome:p?p.nome:'?', need:qtd, disp, falta:Math.max(0, qtd-disp)};
  });
  const insuf = linhas.filter(l=>l.falta>0);
  let body = `<div class="info-box">Vai produzir <strong>${fmt(ped.qtd)} un</strong> de <strong>${escapeHtml(prod.nome)}</strong>. Materiais necessários (multinível):</div>
    <div class="table-wrap"><table>
      <thead><tr><th>Componente</th><th>Necessário</th><th>Disponível</th><th>Falta</th></tr></thead>
      <tbody>${linhas.map(l=>`<tr>
        <td>${escapeHtml(l.nome)}</td>
        <td style="font-family:var(--mono)">${fmt(l.need)}</td>
        <td style="font-family:var(--mono)">${fmt(l.disp)}</td>
        <td style="font-family:var(--mono);color:${l.falta>0?'var(--danger)':'var(--success)'};font-weight:600">${fmt(l.falta)}</td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  if(insuf.length) body += `<div class="alert-danger">⚠ Materiais insuficientes. Você pode gerar Ordem de Compra automaticamente para os faltantes.</div>`;
  else body += `<div class="alert-ok">✅ Materiais disponíveis. Ao confirmar, o estoque será descontado e o produto somado.</div>`;
  openModal('Executar Produção', body, `
    <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
    ${insuf.length?`<button class="btn-warn" onclick="gerarOCFaltantes('${id}')">Gerar OC dos faltantes</button>`:''}
    <button class="btn-add" ${insuf.length?'disabled':''} onclick="confirmarProducao('${id}')">Confirmar Produção</button>
  `, {lg:true});
}
function confirmarProducao(id){
  const ped = getById('pmp', id);
  if(!ped) return;
  const acc = {};
  explodeNeeds(ped.produtoId, n(ped.qtd), acc);
  const prods = getData('produtos');
  for(const [pid, qtd] of Object.entries(acc)){
    const p = prods.find(x=>x.id===pid);
    if(!p || n(p.estoque) < qtd){ toast('err','Erro','Estoque insuficiente para '+(p?p.nome:pid)); return; }
  }
  for(const [pid, qtd] of Object.entries(acc)){
    const p = prods.find(x=>x.id===pid);
    p.estoque = n(p.estoque) - qtd;
  }
  const prodFinal = prods.find(p=>p.id===ped.produtoId);
  if(prodFinal) prodFinal.estoque = n(prodFinal.estoque) + n(ped.qtd);
  saveData('produtos', prods);
  updateById('pmp', id, {status:'Concluído'});
  audit('EXECUTAR_PMP', `${prodFinal?prodFinal.nome:''} ${ped.qtd} un`);
  toast('ok','Produzido!',`${ped.qtd} un de ${prodFinal?prodFinal.nome:''} adicionadas ao estoque.`);
  closeModal(); pmp();
}
function gerarOCFaltantes(id){
  const ped = getById('pmp', id);
  const acc = {};
  explodeNeeds(ped.produtoId, n(ped.qtd), acc);
  const prods = getData('produtos');
  const ordens = getData('ordens');
  const fornecedores = getData('fornecedores');
  let count=0;
  for(const [pid, qtd] of Object.entries(acc)){
    const p = prods.find(x=>x.id===pid);
    if(!p) continue;
    const falta = qtd - n(p.estoque);
    if(falta>0){
      ordens.push({
        id:uid(), componenteId:pid, qtd:Math.ceil(falta),
        fornecedorId:fornecedores[0]?fornecedores[0].id:'',
        dataPedido:todayISO(), dataEntrega:addDaysISO(todayISO(),7),
        status:'Pendente', custo:Math.ceil(falta)*n(p.custo), origem:'PMP:'+id
      });
      count++;
    }
  }
  saveData('ordens', ordens);
  audit('GERAR_OC', `${count} ordens a partir do PMP`);
  toast('ok','OC criadas',`${count} ordens de compra geradas.`);
  closeModal(); load('ordens');
}

/* ── MRP ── */
function mrp(){
  const pmpD = getData('pmp').filter(p=>p.status==='Pendente'||p.status==='Em Produção');
  const prods = getData('produtos');
  const acc = {};
  pmpD.forEach(p=>explodeNeeds(p.produtoId, n(p.qtd), acc));
  const pById = Object.fromEntries(prods.map(p=>[p.id,p]));
  const est = getData('estoque');
  const eByP = Object.fromEntries(est.map(e=>[e.produtoId,e]));
  const res = Object.entries(acc).map(([pid, bruta])=>{
    const p = pById[pid];
    const e = eByP[pid];
    const disp = p?n(p.estoque):0;
    const seg = e?n(e.seg):0;
    return {pid, nome:p?p.nome:'?', categoria:p?p.categoria:'?', bruta, disp, seg, liq:Math.max(0, bruta-disp+seg)};
  }).sort((a,b)=>b.liq-a.liq);

  document.getElementById('content').innerHTML=`
  <div class="page-anim">
    <div class="page-header">
      <div><div class="page-title">MRP</div><div class="page-sub">Material Requirements Planning · Multinível</div></div>
      <div class="page-actions">
        ${can('exec')&&res.some(r=>r.liq>0)?`<button class="btn-warn" onclick="gerarOCMRP()">📑 Gerar OC dos faltantes</button>`:''}
        <button class="btn-secondary" onclick="window.print()">🖨 Imprimir</button>
      </div>
    </div>
    <div class="info-box">🔢 Nec. Líquida = Necessidade Bruta (PMP × BOM recursivo) − Estoque Disponível + Estoque Segurança.</div>
    ${!res.length?`<div class="card"><div class="empty"><div class="empty-icon">⚙️</div>Nenhum pedido ativo no PMP ou sem BOM.</div></div>`:`
    <div class="card">
      <div class="card-title">Necessidades · ${res.length} componente(s)</div>
      <div class="table-wrap"><table>
        <thead><tr><th>Componente</th><th>Categoria</th><th>Bruta</th><th>Disp.</th><th>Seg.</th><th>Líquida</th><th>Status</th><th></th></tr></thead>
        <tbody>${res.map(r=>{
          const s = r.liq===0?['badge-ok','OK']:r.liq<100?['badge-warn','Atenção']:['badge-danger','Comprar'];
          return `<tr>
            <td><strong>${escapeHtml(r.nome)}</strong></td>
            <td><span class="badge badge-gray">${escapeHtml(r.categoria||'—')}</span></td>
            <td style="font-family:var(--mono)">${fmt(r.bruta)}</td>
            <td style="font-family:var(--mono);color:var(--accent2)">${fmt(r.disp)}</td>
            <td style="font-family:var(--mono);color:var(--muted)">${fmt(r.seg)}</td>
            <td style="font-family:var(--mono);font-weight:700;color:${r.liq>0?'var(--danger)':'var(--success)'}">${fmt(r.liq)}</td>
            <td><span class="badge ${s[0]}">${s[1]}</span></td>
            <td>${can('exec')&&r.liq>0?`<button class="btn-go" onclick="gerarOCItem('${r.pid}',${r.liq})">📑 OC</button>`:''}</td>
          </tr>`;
        }).join('')}</tbody>
      </table></div>
    </div>`}
  </div>`;
}
routes.mrp = mrp;

function gerarOCMRP(){
  const pmpD = getData('pmp').filter(p=>p.status==='Pendente'||p.status==='Em Produção');
  const prods = getData('produtos');
  const pById = Object.fromEntries(prods.map(p=>[p.id,p]));
  const est = getData('estoque');
  const eByP = Object.fromEntries(est.map(e=>[e.produtoId,e]));
  const acc = {};
  pmpD.forEach(p=>explodeNeeds(p.produtoId, n(p.qtd), acc));
  const ordens = getData('ordens');
  const fornecedores = getData('fornecedores');
  let count = 0;
  for(const [pid, bruta] of Object.entries(acc)){
    const p = pById[pid]; if(!p) continue;
    const e = eByP[pid];
    const liq = Math.max(0, bruta - n(p.estoque) + (e?n(e.seg):0));
    if(liq>0){
      ordens.push({
        id:uid(), componenteId:pid, qtd:Math.ceil(liq),
        fornecedorId:fornecedores[0]?fornecedores[0].id:'',
        dataPedido:todayISO(), dataEntrega:addDaysISO(todayISO(),7),
        status:'Pendente', custo:Math.ceil(liq)*n(p.custo), origem:'MRP'
      });
      count++;
    }
  }
  saveData('ordens', ordens);
  audit('GERAR_OC_MRP', `${count} ordens`);
  toast('ok','OC criadas',`${count} ordens geradas.`);
  load('ordens');
}
function gerarOCItem(pid, qtd){
  const p = getById('produtos', pid); if(!p) return;
  const ordens = getData('ordens');

  ordens.push({

    fornecedorId:fornecedores[0]?fornecedores[0].id:'',
    dataPedido:todayISO(), dataEntrega:addDaysISO(todayISO(),7),
    status:'Pendente', custo:Math.ceil(qtd)*n(p.custo), origem:'MRP'
  });
  saveData('ordens', ordens);
  audit('GERAR_OC_ITEM', `${p.nome} ${qtd}`);
  toast('ok','OC criada','Pedido de compra registrado.');
  load('ordens');
}

/* ── CRP COM GANTT ── */
function crp(){
  const pmpD = getData('pmp').filter(p=>p.status==='Pendente'||p.status==='Em Produção');
  const maqD = getData('maquinas');
  const total = pmpD.reduce((a,p)=>a+n(p.qtd),0);
  const capMaq = maqD.reduce((a,m)=>a+n(m.prodHora)*n(m.tempo),0);
  const cap = capMaq||2000;
  const uso = cap>0 ? total/cap : 0;
  const porProd = {};
  const prods = getData('produtos');
  const pById = Object.fromEntries(prods.map(p=>[p.id,p.nome]));
  pmpD.forEach(p=>{ const k=pById[p.produtoId]||'?'; porProd[k]=(porProd[k]||0)+n(p.qtd); });

  // Gantt: por máquina, entre min(dataInicio) e max(dataFim)
  let minD=null, maxD=null;
  pmpD.forEach(p=>{
    if(!minD||p.dataInicio<minD) minD=p.dataInicio;
    if(!maxD||p.dataFim>maxD) maxD=p.dataFim;
  });
  const totalDays = (minD&&maxD) ? daysBetween(minD,maxD) : 0;
  const ganttCols = '160px 1fr';

  document.getElementById('content').innerHTML=`
  <div class="page-anim">
    <div class="page-header">
      <div><div class="page-title">CRP</div><div class="page-sub">Capacity Requirements Planning</div></div>
      <div class="page-actions"><button class="btn-secondary" onclick="window.print()">🖨 Imprimir</button></div>
    </div>
    <div class="info-box">📊 Capacidade: ${fmt(cap)} un/período · ${maqD.length} máquina(s) cadastrada(s).</div>
    <div class="grid2">
      <div class="card">
        <div class="card-title">Carga vs Capacidade</div>
        <div style="margin-bottom:20px">
          <div style="font-size:12px;color:var(--muted);font-weight:500;margin-bottom:6px">Carga do PMP Ativo</div>
          <div style="font-size:38px;font-weight:700;font-family:var(--mono);color:${uso>1?'var(--danger)':uso>0.8?'var(--warn)':'var(--accent)'}">${fmt(total)}<span style="font-size:16px;color:var(--muted);font-weight:400"> un</span></div>
        </div>
        <div class="crp-bar-wrap">
          <div class="crp-bar-label"><span>Utilização</span><span style="font-weight:700;color:${uso>1?'var(--danger)':uso>0.8?'var(--warn)':'var(--accent)'}">${(uso*100).toFixed(1)}%</span></div>
          <div class="crp-bar-bg"><div class="crp-bar-fill" style="width:${Math.min(uso,1)*100}%;background:${uso>1?'var(--danger)':uso>0.8?'var(--warn)':'var(--accent)'}"></div></div>
        </div>
        <div class="grid2" style="margin-top:18px;gap:12px">
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px"><div class="stat-label">Capacidade</div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:var(--accent2)">${fmt(cap)}</div></div>
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px"><div class="stat-label">Saldo</div><div style="font-family:var(--mono);font-size:20px;font-weight:700;color:${(cap-total)>=0?'var(--success)':'var(--danger)'}">${fmt(cap-total)}</div></div>
        </div>
        ${uso>1?`<div class="alert-danger">⚠️ Capacidade excedida em ${((uso-1)*100).toFixed(1)}%.</div>`:total>0?`<div class="alert-ok">✅ Produção dentro da capacidade.</div>`:''}
      </div>
      <div class="card">
        <div class="card-title">Carga por Produto</div>
        ${!Object.keys(porProd).length?`<div class="empty"><div class="empty-icon">📊</div>Nenhum pedido ativo.</div>`:
          Object.entries(porProd).map(([prod,qtd])=>`
            <div class="crp-bar-wrap">
              <div class="crp-bar-label"><span style="font-size:13px">${escapeHtml(prod)}</span><span style="font-weight:600;color:var(--accent)">${fmt(qtd)} un</span></div>
              <div class="crp-bar-bg"><div class="crp-bar-fill" style="width:${Math.min(qtd/cap,1)*100}%;background:#0891b2"></div></div>
            </div>`).join('')}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Gantt — Ocupação por Máquina ${minD?`(${fmtDate(minD)} → ${fmtDate(maxD)})`:''}</div>
      ${!totalDays?`<div class="empty"><div class="empty-icon">📅</div>Sem pedidos ativos.</div>`:`
      <div class="gantt">
        <div class="gantt-head" style="grid-template-columns:${ganttCols}"><div>Máquina</div><div>${totalDays} dia(s)</div></div>
        ${maqD.map((m,mi)=>{
          const pedidos = pmpD.filter(p=>p.maquinaId===m.id);
          if(!pedidos.length) return `<div class="gantt-row" style="grid-template-columns:${ganttCols}"><div class="gantt-name">${escapeHtml(m.nome)}</div><div class="gantt-track"><span style="color:var(--muted);font-size:10px;align-self:center;padding-left:6px">— sem alocação —</span></div></div>`;
          const bars = pedidos.map((p,pi)=>{
            const offset = (daysBetween(minD,p.dataInicio)-1)/totalDays*100;
            const wDays = daysBetween(p.dataInicio,p.dataFim);
            const w = wDays/totalDays*100;
            const cls = ['','b2','b3','b4'][pi%4];
            return `<div class="gantt-bar ${cls}" style="left:${offset}%;width:${w}%" title="${escapeHtml(pById[p.produtoId]||'')} (${p.qtd} un)">${escapeHtml((pById[p.produtoId]||'').split(' ')[0])} ${p.qtd}</div>`;
          }).join('');
          return `<div class="gantt-row" style="grid-template-columns:${ganttCols}"><div class="gantt-name">${escapeHtml(m.nome)}</div><div class="gantt-track">${bars}</div></div>`;
        }).join('')}
      </div>`}
    </div>
  </div>`;
}
routes.crp = crp;

async function saveUser(id){
  const nome = document.getElementById('f-nome').value.trim();
  const perfil = document.getElementById('f-perfil').value;
  const senha = document.getElementById('f-senha').value;
  if(!nome){ toast('err','Erro','Nome obrigatório.'); return; }
  const list = getData('usuarios');
  const dup = list.find(u=>u.nome.toLowerCase()===nome.toLowerCase() && u.id!==id);
  if(dup){ toast('err','Erro','Usuário já existe.'); return; }
  if(id){
    const patch = {nome, perfil};
    if(senha){ if(senha.length<4){ toast('err','Erro','Senha mínima 4 caracteres.'); return; } patch.senhaHash = await sha256(senha); }
    updateById('usuarios', id, patch);
    audit('UPDATE_USER', nome);
  } else {
    if(!senha || senha.length<4){ toast('err','Erro','Senha mínima 4 caracteres.'); return; }
    const senhaHash = await sha256(senha);
    list.push({id:uid(), nome, perfil, senhaHash});
    saveData('usuarios', list);
    audit('CREATE_USER', nome);
  }
  closeModal(); toast('ok','Salvo',''); usuarios();
}
function delUser(id){
  if(id===CURRENT.id){ toast('err','Erro','Não pode remover a si mesmo.'); return; }
  if(!confirm('Remover usuário?')) return;
  deleteById('usuarios', id); audit('DELETE_USER',''); usuarios();
}

      <div class="card-title">Eventos · ${filtered.length}<input class="search-box" placeholder="🔍 Buscar..." value="${escapeHtml(st.search)}" oninput="setSearch('auditoria',this.value)"></div>
      ${!paged.length?`<div class="empty"><div class="empty-icon">📜</div>Sem registros.</div>`:`
      <div class="table-wrap"><table>
        <thead><tr><th>Data/Hora</th><th>Usuário</th><th>Ação</th><th>Detalhes</th></tr></thead>
        <tbody>${paged.map(a=>`<tr>
          <td style="font-family:var(--mono);font-size:11px">${new Date(a.data).toLocaleString('pt-BR')}</td>
          <td><span class="badge badge-blue">${escapeHtml(a.usuario)}</span></td>
          <td style="font-family:var(--mono);font-size:12px;font-weight:600">${escapeHtml(a.acao)}</td>
          <td style="color:var(--muted);font-size:12px">${escapeHtml(a.detalhes)}</td>
        </tr>`).join('')}</tbody>
      </table></div>
      ${pagerHtml('auditoria', filtered.length)}`}
    </div>
  </div>`;
}
routes.auditoria = auditoria;
function exportAudit(){ downloadFile('auditoria.csv', toCSV(getData('audit'), ['data','usuario','acao','detalhes']), 'text/csv'); toast('ok','Exportado',''); }

/* ── CONFIG ── */
function config(){
  const keys = ['produtos','bom','estoque','pmp','operadores','maquinas','ordens','fornecedores','usuarios','audit'];
  document.getElementById('content').innerHTML=`
  <div class="page-anim">
    <div class="page-header">
      <div><div class="page-title">Configurações</div><div class="page-sub">Administração do sistema</div></div>
      <div class="page-actions"><button class="btn-secondary" onclick="window.print()">🖨 Relatório PDF</button></div>
    </div>
    <div class="card">
      <div class="card-title">Resumo de Dados</div>
      <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px">
        ${keys.map(k=>`
          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:14px;text-align:center">
            <div class="stat-label">${k}</div>
            <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--accent)">${getData(k).length}</div>
          </div>`).join('')}
      </div>
      <div style="display:flex;gap:12px;flex-wrap:wrap">
        <button class="btn-secondary" onclick="exportAll()">⬇ Backup completo (JSON)</button>
        ${can('write')?`<button class="btn-secondary" onclick="document.getElementById('imp-all').click()">⬆ Restaurar JSON</button>
        <input type="file" id="imp-all" accept=".json" style="display:none" onchange="importAll(event)">`:''}
        ${CURRENT.perfil==='Administrador'?`<button class="btn-del" style="padding:10px 20px;font-size:13px" onclick="resetSystem()">⚠ Resetar Sistema</button>`:''}
      </div>
    </div>
    <div class="card">
      <div class="card-title">Sobre o Sistema</div>
      <div style="font-size:13px;color:var(--muted);line-height:2;font-family:var(--mono)">
        <div>Plataforma&nbsp;&nbsp;Vixmilks ERP PCP v5.0</div>
        <div>Storage&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;localStorage (navegador)</div>
        <div>Auth&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;SHA-256 + perfis</div>
        <div>Módulos&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;Dashboard · PMP · MRP recursivo · CRP+Gantt · OC automáticas · Estoque · Auditoria</div>
      </div>
    </div>
  </div>`;
}
routes.config = config;
function exportAll(){
  const data = {};
  ['produtos','bom','estoque','pmp','operadores','maquinas','ordens','fornecedores','usuarios','audit'].forEach(k=>data[k]=getData(k));
  downloadFile('vixmilks_backup_'+todayISO()+'.json', JSON.stringify(data,null,2), 'application/json');
  audit('EXPORT_BACKUP','');
  toast('ok','Exportado','');
}
function importAll(ev){
  const f = ev.target.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if(!confirm('Substituir TODOS os dados pelos do arquivo?')) return;
      ['produtos','bom','estoque','pmp','operadores','maquinas','ordens','fornecedores','usuarios','audit'].forEach(k=>{
        if(Array.isArray(data[k])) saveData(k, data[k]);
      });
      audit('IMPORT_BACKUP','');
      toast('ok','Importado','Dados restaurados.');
      load('config');
    } catch(err){ toast('err','Erro','Arquivo inválido.'); }
  };
  r.readAsText(f);
  ev.target.value='';
}
async function resetSystem(){
  if(!confirm('Apagar TODOS os dados e refazer cadastros padrão?')) return;
  ['produtos','bom','estoque','pmp','operadores','maquinas','ordens','fornecedores','usuarios','audit'].forEach(k=>localStorage.removeItem('vmk_'+k));
  localStorage.removeItem('vmk_seeded');
  await seed();
  toast('ok','Reset','Sistema reinicializado.');
  setTimeout(()=>location.reload(), 600);
}

/* ── INIT ── */
(async function(){
  await seed();
  const sid = sessionStorage.getItem('vmk_session');
  if(sid){
    const u = getById('usuarios', sid);
    if(u){
      CURRENT = u;
      document.getElementById('login').style.display='none';
      document.getElementById('app').style.display='block';
      renderShell();
      load('dashboard');
      refreshBell();
    }
  }
})();
</script>
