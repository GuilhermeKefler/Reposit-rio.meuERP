<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vixmilks ERP</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:#f1f5f9; --surface:#fff; --surface2:#f8fafc; --border:#e2e8f0;
  --sidebar:#0f172a; --sidebar-text:#cbd5e1; --sidebar-muted:#475569;
  --accent:#2563eb; --accent-h:#1d4ed8; --accent2:#0891b2; --accent3:#7c3aed;
  --success:#059669; --warn:#d97706; --danger:#dc2626;
  --text:#1e293b; --muted:#64748b;
  --font:'Inter',sans-serif; --mono:'JetBrains Mono',monospace;
  --sw:220px; --th:60px; --r:10px;
  --shadow:0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 10px 40px rgba(0,0,0,.1);
}
body { font-family:var(--font); background:var(--bg); color:var(--text); font-size:14px; min-height:100vh; }

/* LOGIN */
#login { display:flex; height:100vh; justify-content:center; align-items:center; background:linear-gradient(135deg,#0f172a 0%,#1e3a5f 100%); position:relative; overflow:hidden; }
#login::before { content:''; position:absolute; width:600px; height:600px; border:1px solid rgba(255,255,255,.04); border-radius:50%; top:-200px; right:-200px; }
#login::after  { content:''; position:absolute; width:400px; height:400px; border:1px solid rgba(255,255,255,.04); border-radius:50%; bottom:-150px; left:-100px; }
.login-box { background:#fff; border-radius:16px; padding:44px 40px; width:340px; box-shadow:var(--shadow-lg); position:relative; z-index:1; animation:fadeUp .5s ease; }
.login-brand { font-size:11px; font-weight:600; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:6px; }
.login-box h2 { font-size:26px; font-weight:700; margin-bottom:4px; }
.login-box p { font-size:13px; color:var(--muted); margin-bottom:28px; }
.field { margin-bottom:14px; }
.field label { display:block; font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.06em; text-transform:uppercase; margin-bottom:6px; }
.field input, .field select { width:100%; padding:11px 14px; border:1.5px solid var(--border); border-radius:8px; font:inherit; font-size:14px; outline:none; transition:border-color .2s, box-shadow .2s; background:#fff; }
.field input:focus, .field select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
.field input.err { border-color:var(--danger); box-shadow:0 0 0 3px rgba(220,38,38,.1); }
.login-err { font-size:12px; color:var(--danger); font-weight:500; min-height:18px; margin-top:8px; }
.btn-login { width:100%; padding:12px; background:var(--accent); color:#fff; border:none; border-radius:8px; font:inherit; font-size:14px; font-weight:600; cursor:pointer; margin-top:6px; transition:background .2s, transform .1s; letter-spacing:.02em; }
.btn-login:hover { background:var(--accent-h); transform:translateY(-1px); }
.login-hint { margin-top:16px; background:#f8fafc; border-radius:8px; padding:10px 14px; font-size:12px; color:var(--muted); text-align:center; line-height:1.6; }
.login-hint strong { color:var(--accent); }

/* SHELL */
#app { display:none; }
.sidebar { width:var(--sw); height:100vh; background:var(--sidebar); position:fixed; top:0; left:0; display:flex; flex-direction:column; overflow:hidden; }
.sidebar-header { padding:22px 18px 18px; border-bottom:1px solid rgba(255,255,255,.06); }
.sidebar-brand { font-size:10px; font-weight:600; color:#38bdf8; letter-spacing:.2em; text-transform:uppercase; margin-bottom:4px; }
.sidebar-title { font-size:18px; font-weight:700; color:#fff; }
.sidebar-sub { font-size:11px; color:var(--sidebar-muted); margin-top:2px; }
.sidebar-nav { flex:1; padding:10px 0; overflow-y:auto; }
.nav-section { margin-bottom:4px; }
.nav-sec-label { font-size:10px; font-weight:600; color:var(--sidebar-muted); letter-spacing:.12em; text-transform:uppercase; padding:8px 18px 4px; }
.nav-btn { display:flex; align-items:center; gap:10px; width:100%; padding:9px 18px; background:none; border:none; border-left:2px solid transparent; color:var(--sidebar-text); font:inherit; font-size:13px; text-align:left; cursor:pointer; transition:all .15s; }
.nav-btn:hover { color:#fff; background:rgba(255,255,255,.05); }
.nav-btn.active { color:#38bdf8; border-left-color:#38bdf8; background:rgba(56,189,248,.08); }
.nav-btn[disabled] { opacity:.35; cursor:not-allowed; }
.nav-icon { font-size:15px; width:18px; text-align:center; }
.sidebar-footer { padding:14px 18px; border-top:1px solid rgba(255,255,255,.06); }
.sidebar-user { display:flex; align-items:center; gap:10px; }
.user-avatar { width:32px; height:32px; background:var(--accent); border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:13px; color:#fff; flex-shrink:0; }
.user-name { font-size:13px; color:#fff; font-weight:500; }
.user-role { font-size:11px; color:var(--sidebar-muted); }
.btn-logout { margin-left:auto; background:none; border:none; color:var(--sidebar-muted); cursor:pointer; font-size:16px; transition:color .15s; }
.btn-logout:hover { color:#fc8181; }

/* TOPBAR */
.topbar { margin-left:var(--sw); height:var(--th); background:var(--surface); border-bottom:1px solid var(--border); display:flex; align-items:center; padding:0 24px; position:sticky; top:0; z-index:10; gap:12px; }
.topbar-title { font-size:15px; font-weight:600; }
.topbar-sub { font-size:12px; color:var(--muted); margin-left:2px; }
.topbar-spacer { flex:1; }
.topbar-date { font-size:12px; color:var(--muted); font-family:var(--mono); }
.bell { position:relative; background:none; border:none; cursor:pointer; padding:6px 10px; border-radius:8px; transition:background .15s; font-size:16px; }
.bell:hover { background:var(--surface2); }
.bell-dot { position:absolute; top:4px; right:6px; min-width:16px; height:16px; padding:0 4px; background:var(--danger); color:#fff; font-size:10px; font-weight:700; border-radius:8px; display:flex; align-items:center; justify-content:center; font-family:var(--font); }

/* CONTENT */
.content { margin-left:var(--sw); padding:24px; min-height:calc(100vh - var(--th)); }
.page-header { margin-bottom:22px; display:flex; justify-content:space-between; align-items:flex-end; gap:16px; flex-wrap:wrap; }
.page-title { font-size:20px; font-weight:700; }
.page-sub { font-size:13px; color:var(--muted); margin-top:3px; }
.page-actions { display:flex; gap:8px; flex-wrap:wrap; }

/* CARD */
.card { background:var(--surface); border-radius:var(--r); box-shadow:var(--shadow); padding:22px; margin-bottom:18px; border:1px solid var(--border); }
.card-title { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.1em; text-transform:uppercase; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; gap:12px; }

/* STAT CARDS */
.stats-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:14px; margin-bottom:18px; }
.stat-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--r); padding:18px; box-shadow:var(--shadow); position:relative; overflow:hidden; }
.stat-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
.stat-card.c1::before { background:linear-gradient(90deg,#2563eb,#38bdf8); }
.stat-card.c2::before { background:linear-gradient(90deg,#0891b2,#06b6d4); }
.stat-card.c3::before { background:linear-gradient(90deg,#7c3aed,#a78bfa); }
.stat-card.c4::before { background:linear-gradient(90deg,#d97706,#fbbf24); }
.stat-card.c5::before { background:linear-gradient(90deg,#dc2626,#f87171); }
.stat-label { font-size:11px; font-weight:600; color:var(--muted); letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
.stat-value { font-size:24px; font-weight:700; font-family:var(--mono); line-height:1; }

/* UTILS */
.empty { text-align:center; padding:44px; color:var(--muted); font-size:13px; }
.empty-icon { font-size:32px; margin-bottom:10px; }
.pill { display:inline-flex; align-items:center; gap:6px; padding:5px 12px; border-radius:20px; font-size:12px; font-weight:500; }
.pill-blue { background:#dbeafe; color:#1e40af; }

/* ANIMATIONS */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
@keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
.page-anim { animation:fadeUp .3s ease; }

@media (max-width:900px){
  .stats-grid { grid-template-columns:repeat(2,1fr); }
  .sidebar { transform:translateX(-100%); transition:transform .2s; z-index:50; }
  .topbar, .content { margin-left:0; }
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="login-box">
    <div class="login-brand">Laticínios · ERP</div>
    <h2>Vixmilks</h2>
    <p>Sistema de Gestão Industrial</p>
    <div class="field">
      <label>Usuário</label>
      <input id="user" placeholder="Admin" autocomplete="username" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="field">
      <label>Senha</label>
      <input id="pass" type="password" placeholder="••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div id="login-err" class="login-err"></div>
    <button class="btn-login" onclick="login()">Entrar no Sistema</button>
    <div class="login-hint">
      <strong>Admin</strong> / 1234 &nbsp;·&nbsp; <strong>supervisor</strong> / 1234<br>
      <strong>operador</strong> / 1234
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-brand">ERP · PCP</div>
      <div class="sidebar-title">Vixmilks</div>
      <div class="sidebar-sub">Laticínios Industrial</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="user-avatar" id="uavatar">A</div>
        <div>
          <div class="user-name" id="uname">Admin</div>
          <div class="user-role" id="urole">Administrador</div>
        </div>
        <button class="btn-logout" title="Sair" onclick="logout()">⏻</button>
      </div>
    </div>
  </div>

  <div class="topbar">
    <span class="topbar-title" id="topbar-title">Dashboard</span>
    <span class="topbar-sub" id="topbar-sub">Vixmilks · Sistema de Gestão</span>
    <div class="topbar-spacer"></div>
    <span class="topbar-date" id="topbar-date"></span>
    <span class="pill pill-blue" id="topbar-user-pill">👤 Admin</span>
  </div>

  <div class="content" id="content"></div>
</div>

<script>
/* ── HELPERS ── */
function n(v){ const x=Number(v); return isFinite(x)?x:0; }
function uid(){ return 'id_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
async function sha256(s){
  const buf = new TextEncoder().encode(s);
  const hash = await crypto.subtle.digest('SHA-256', buf);
  return Array.from(new Uint8Array(hash)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

/* ── STORAGE ── */
function getData(k){ try { return JSON.parse(localStorage.getItem('vmk_'+k))||[]; } catch(e){ return []; } }
function saveData(k,d){ try { localStorage.setItem('vmk_'+k, JSON.stringify(d)); } catch(e){ console.error('Storage full'); } }
function getById(k,id){ return getData(k).find(x=>x.id===id); }

/* ── SEED ── */
async function seed(){
  if(localStorage.getItem('vmk_seeded')==='2') return;
  const adminHash = await sha256('1234');
  
  saveData('usuarios', [
    {id:uid(), nome:"Admin", senhaHash:adminHash, perfil:"Administrador"},
    {id:uid(), nome:"supervisor", senhaHash:adminHash, perfil:"Supervisor"},
    {id:uid(), nome:"operador", senhaHash:adminHash, perfil:"Operador"}
  ]);
  
  saveData('produtos', [
    {id:uid(), nome:"Leite Integral 1L", estoque:500, categoria:"Acabado"},
    {id:uid(), nome:"Queijo Mussarela kg", estoque:120, categoria:"Acabado"}
  ]);

  localStorage.setItem('vmk_seeded','2');
}

/* ── PERMISSÕES ── */
const PERFIS = {
  Administrador: { all:true },
  Supervisor:    { read:true, write:true, users:false },
  Operador:      { read:true, write:false, users:false }
};
let CURRENT = null;
function can(action){
  if(!CURRENT) return false;
  const p = PERFIS[CURRENT.perfil] || {};
  return p.all || !!p[action];
}

/* ── AUTH ── */
async function login(){
  const u = document.getElementById('user').value.trim();
  const p = document.getElementById('pass').value;
  const err = document.getElementById('login-err');
  if(!u || !p) return;
  
  const hash = await sha256(p);
  const usr = getData('usuarios').find(x=>x.nome.toLowerCase()===u.toLowerCase() && x.senhaHash===hash);
  
  if(usr){
    CURRENT = usr;
    sessionStorage.setItem('vmk_session', usr.id);
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    renderShell();
    load('dashboard');
  } else {
    err.textContent='⚠ Usuário ou senha inválidos.';
  }
}

function logout(){
  CURRENT = null;
  sessionStorage.removeItem('vmk_session');
  document.getElementById('app').style.display='none';
  document.getElementById('login').style.display='flex';
  document.getElementById('user').value = '';
  document.getElementById('pass').value = '';
}

/* ── NAVIGATION ── */
function renderShell() {
  document.getElementById('uname').textContent = CURRENT.nome;
  document.getElementById('urole').textContent = CURRENT.perfil;
  document.getElementById('uavatar').textContent = CURRENT.nome.charAt(0).toUpperCase();
  document.getElementById('topbar-user-pill').textContent = `👤 ${CURRENT.nome}`;

  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = `
    <div class="nav-section">
      <div class="nav-sec-label">Geral</div>
      <button class="nav-btn active" onclick="load('dashboard', this)">📊 Dashboard</button>
    </div>
    <div class="nav-section">
      <div class="nav-sec-label">Produção</div>
      <button class="nav-btn" onclick="load('produtos', this)">📦 Produtos</button>
      <button class="nav-btn" onclick="load('estoque', this)">🏢 Estoque</button>
    </div>
    ${can('users') ? `
    <div class="nav-section">
      <div class="nav-sec-label">Administração</div>
      <button class="nav-btn" onclick="load('usuarios', this)">👥 Usuários</button>
    </div>` : ''}
  `;
}

function load(page, btn) {
  if(btn) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  document.getElementById('topbar-title').textContent = page.charAt(0).toUpperCase() + page.slice(1);
  const content = document.getElementById('content');
  
  if(page === 'dashboard') {
    const prods = getData('produtos');
    content.innerHTML = `
      <div class="page-header page-anim">
        <div>
          <div class="page-title">Dashboard</div>
          <div class="page-sub">Indicadores em tempo real.</div>
        </div>
      </div>
      <div class="stats-grid page-anim">
        <div class="stat-card c1"><div class="stat-label">Produtos</div><div class="stat-value">${prods.length}</div></div>
        <div class="stat-card c2"><div class="stat-label">Ordens Ativas</div><div class="stat-value">0</div></div>
      </div>
      <div class="card page-anim">
        <div class="empty">📊 Bem-vindo ao sistema de gestão industrial.</div>
      </div>`;
  } else {
    content.innerHTML = `
      <div class="card page-anim">
        <div class="empty"><div class="empty-icon">🚧</div>Módulo <b>${page}</b> em desenvolvimento.</div>
      </div>`;
  }
}

/* ── INIT ── */
window.onload = async () => {
  document.getElementById('topbar-date').textContent = new Date().toLocaleDateString('pt-BR');
  await seed();
  const session = sessionStorage.getItem('vmk_session');
  if(session) {
    CURRENT = getById('usuarios', session);
    if(CURRENT) {
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      renderShell();
      load('dashboard');
    }
  }
};
</script>
</body>
</html>
